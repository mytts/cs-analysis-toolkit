title: Cobalt Strike DNS Beacon Subdomain Encoding
id: cs-dns-beacon-subdomain
status: experimental
description: |
  检测 CS DNS Beacon 的子域名编码模式。
  DNS Beacon 使用 hex 编码将数据嵌入子域名查询。
level: high
date: 2026/04/01
author: CS 逆向分析项目
references:
  - "Doc 23 - DNS Beacon 子域名编码格式字符串"

logsource:
  category: dns
  product: any

detection:
  # 默认 DNS 前缀 (default.profile)
  dns_prefixes:
    query|startswith:
      - 'cdn.'
      - 'www6.'
      - 'api.'
      - 'post.'

  # Hex 编码数据子域名 (4-7 个 label, 每个 8-56 hex chars)
  hex_subdomain:
    query|re: '\.[1-4][0-9a-f]{8}\.[0-9a-f]{8,56}\.'

  # 异常长子域名 (DNS tunneling 特征)
  long_subdomain:
    query|re: '^[a-z0-9.]{60,253}$'

  # A/AAAA/TXT 混合查询
  record_types:
    rrtype:
      - 'A'
      - 'AAAA'
      - 'TXT'

  condition: (dns_prefixes and hex_subdomain) or (hex_subdomain and long_subdomain and record_types)

falsepositives:
  - CDN 服务的长子域名
  - 合法的 DNS-based 服务发现
tags:
  - attack.command_and_control
  - attack.t1071.004  # Application Layer Protocol: DNS
  - cobalt_strike
