title: Cobalt Strike Beacon Process Injection Indicators
id: cs-beacon-process-injection
status: experimental
description: |
  检测 CS Beacon 进程注入行为。
  覆盖传统注入 + 4.12 新技术 (线程池、进程克隆)。
level: critical
date: 2026/04/01
author: CS 逆向分析项目
references:
  - "Doc 15 - 进程注入技术"
  - "Doc 28 - 4.12 新注入技术"

logsource:
  category: process_access
  product: windows

detection:
  # 经典 CreateRemoteThread 注入
  remote_thread:
    EventID: 8  # Sysmon CreateRemoteThread
    SourceImage|endswith:
      - '\rundll32.exe'
      - '\dllhost.exe'
      - '\gpupdate.exe'
      - '\mstsc.exe'
    TargetImage|endswith:
      - '\svchost.exe'
      - '\explorer.exe'

  # 可疑的内存分配模式 (VirtualAllocEx + WriteProcessMemory)
  memory_alloc:
    EventID: 10  # Sysmon ProcessAccess
    GrantedAccess|contains:
      - '0x1F0FFF'  # PROCESS_ALL_ACCESS
      - '0x001F0FFF'
      - '0x1FFFFF'

  # CS 默认 SpawnTo 进程
  spawnto:
    EventID: 1  # Sysmon ProcessCreate
    Image|endswith:
      - '\rundll32.exe'
    CommandLine|contains:
      - 'rundll32.exe'
    ParentImage|endswith:
      - '\rundll32.exe'
      - '\dllhost.exe'

  condition: remote_thread or memory_alloc or spawnto

falsepositives:
  - 合法的 rundll32 使用
  - Windows 系统更新进程
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1055  # Process Injection
  - cobalt_strike
