title: Cobalt Strike REST API Access (4.12+)
id: cs-rest-api-access
status: experimental
description: |
  检测对 CS TeamServer REST API 的访问 (端口 50443)。
level: critical
date: 2026/04/01
author: CS 逆向分析项目
references:
  - "Doc 28 - REST API 分析"

logsource:
  category: firewall
  product: any

detection:
  rest_api_port:
    dst_port: 50443

  rest_api_traffic:
    dst_port: 50443
    action: 'allow'

  condition: rest_api_port

falsepositives:
  - 其他使用 50443 端口的应用
tags:
  - attack.command_and_control
  - attack.t1219  # Remote Access Software
  - cobalt_strike
