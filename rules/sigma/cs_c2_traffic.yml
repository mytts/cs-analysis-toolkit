title: Cobalt Strike Named Pipe Beacon
id: cs-smb-beacon-pipe
status: experimental
description: |
  检测 CS SMB Beacon 使用的命名管道通信模式。
level: high
date: 2026/04/01
author: CS 逆向分析项目
references:
  - "Doc 23 - SMB/TCP Beacon"

logsource:
  category: pipe_created
  product: windows

detection:
  # CS 默认管道名称模式
  default_pipes:
    PipeName|startswith:
      - '\MSSE-'           # 默认 Beacon pipe
      - '\msagent_'        # 默认 PostEx pipe
      - '\postex_'         # 自定义 PostEx
      - '\postex_ssh_'     # SSH agent

  # CS 常见自定义管道名模式
  custom_pipes:
    PipeName|re: '\\\\[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}'

  condition: default_pipes or custom_pipes

falsepositives:
  - Windows Defender (MSSE- 前缀)
  - 合法的 UUID 格式管道名
tags:
  - attack.command_and_control
  - attack.t1570  # Lateral Tool Transfer
  - cobalt_strike
