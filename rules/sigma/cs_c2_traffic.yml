title: Cobalt Strike Default C2 Profile HTTP Traffic
id: cs-c2-default-profile-http
status: experimental
description: |
  检测使用默认 Malleable C2 Profile 的 Cobalt Strike Beacon HTTP 通信。
  基于 CS 4.9.1 default.profile 逆向分析。
level: high
date: 2026/04/01
author: CS 逆向分析项目
references:
  - "Doc 23 - Beacon 通信协议与 C2 Profile 逆向"

logsource:
  category: proxy
  product: any

detection:
  # 默认 GET URI 集合 (21 个)
  default_get_uris:
    cs-uri|endswith:
      - '/ca'
      - '/dpixel'
      - '/__utm.gif'
      - '/pixel.gif'
      - '/g.pixel'
      - '/dot.gif'
      - '/updates.rss'
      - '/fwlink'
      - '/cm'
      - '/cx'
      - '/pixel'
      - '/match'
      - '/visit.js'
      - '/load'
      - '/push'
      - '/ptj'
      - '/j.ad'
      - '/ga.js'
      - '/en_US/all.js'
      - '/activity'
      - '/IE9CompatViewList.xml'

  # 默认 POST URI
  default_post_uri:
    cs-uri|endswith: '/submit.php'
    cs-method: 'POST'
    cs-content-type: 'application/octet-stream'

  # Cookie 中的 Base64 元数据 (RSA 加密)
  beacon_cookie:
    cs-cookie|re: '^[A-Za-z0-9+/=]{44,512}$'

  # 定时心跳模式 (默认 60s ± jitter)
  periodic_pattern:
    cs-method: 'GET'

  condition: (default_get_uris and beacon_cookie) or default_post_uri

falsepositives:
  - 正常的 Web 分析追踪像素请求
  - 合法的 submit.php 表单提交
tags:
  - attack.command_and_control
  - attack.t1071.001  # Application Layer Protocol: Web Protocols
  - cobalt_strike
